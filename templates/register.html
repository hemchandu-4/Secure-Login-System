<!DOCTYPE html>
<html>
<head>

<title>Register</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Register</h1>

<form action="/register" method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>
Register
</button>

</form>

<p class="center">

Already have an account?

<a href="/login">

Login

</a>

</p>

</div>

</body>
</html>
