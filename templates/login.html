<!DOCTYPE html>
<html>

<head>

<title>Login</title>

<link rel="stylesheet"
href="{{ url_for('static',filename='style.css') }}">

</head>

<body>

<div class="container">

<h1>Login</h1>

<form action="/login" method="POST">

<input
type="text"
name="username"
placeholder="Username"
required>

<input
type="password"
name="password"
placeholder="Password"
required>

<button>

Login

</button>

</form>

<p class="center">

New User?

<a href="/">

Register

</a>

</p>

</div>

</body>
</html>
